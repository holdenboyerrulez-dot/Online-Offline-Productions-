<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlineDictionary4Free</title>
    <style>
        :root { --blue: #0055ff; --bg: #fdfdfd; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #222; overflow: hidden; }

        /* 1. STARTUP SCREEN (5 Seconds) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .prod-logo { font-size: 24px; font-weight: 900; color: white; letter-spacing: 2px; text-align: center; }
        .prod-logo span { color: var(--blue); font-size: 12px; display: block; margin-top: 8px; letter-spacing: 4px; }

        /* 2. SEARCH LOADER (2 Seconds) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--blue); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 5000;
        }
        .loading-text { color: white; font-size: 22px; font-weight: bold; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.98); } }

        /* 3. MAIN APP */
        #app { display: none; height: 100vh; overflow-y: auto; }
        
        header { background: white; padding: 15px 20px; border-bottom: 4px solid var(--blue); position: sticky; top: 0; z-index: 10; }
        .logo { font-weight: 900; font-size: 22px; }
        .logo span { color: var(--blue); }

        .search-container { padding: 30px 20px; background: white; }
        input {
            width: 100%; padding: 16px; border: 2px solid #eee;
            border-radius: 12px; font-size: 18px; outline: none;
            box-sizing: border-box; background: #f9f9f9;
        }

        #results { padding: 0 20px 60px; }
        .meaning-card {
            background: white; padding: 25px; border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px;
            border-left: 6px solid var(--blue);
        }
        .word-head { font-size: 34px; font-weight: 900; color: #000; margin-bottom: 5px; }
        .pos { font-size: 12px; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .simple-text { font-size: 20px; line-height: 1.5; color: #333; font-weight: 500; }
        .example-box { font-size: 17px; color: #777; font-style: italic; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="prod-logo">ONLINE/OFFLINE<span>PRODUCTIONS</span></div>
    </div>

    <div id="loader">
        <div class="loading-text">Finding definition...</div>
    </div>

    <div id="app">
        <header>
            <div class="logo">OnlineDictionary<span>4Free</span></div>
        </header>

        <div class="search-container">
            <input type="text" id="userInput" placeholder="Search a word..." onkeydown="if(event.key==='Enter') executeSearch()">
        </div>

        <div id="results">
            <div class="meaning-card">
                <div class="simple-text">Welcome. Type a word and I'll explain it in <b>plain English</b>.</div>
            </div>
        </div>
    </div>

    <script>
        // Start-up sequence (5s)
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }, 5000);

        async function executeSearch() {
            const word = document.getElementById('userInput').value.trim();
            if (!word) return;

            // Trigger Blue Loading Screen
            const ldr = document.getElementById('loader');
            ldr.style.display = 'flex';

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const data = await response.json();

                // 2 second "Thinking" delay
                setTimeout(() => {
                    ldr.style.display = 'none';
                    showHumanDefinition(data);
                }, 2000);

            } catch (error) {
                setTimeout(() => {
                    ldr.style.display = 'none';
                    document.getElementById('results').innerHTML = `<div class="meaning-card">Couldn't connect. Check your internet.</div>`;
                }, 2000);
            }
        }

        function showHumanDefinition(data) {
            const resArea = document.getElementById('results');
            
            if (data.title) {
                resArea.innerHTML = `<div class="meaning-card"><div class="word-head">Oops!</div><div class="simple-text">I don't know that word. Check your spelling and try again.</div></div>`;
                return;
            }

            const item = data[0];
            let content = `<div class="meaning-card"><div class="word-head">${item.word}</div></div>`;

            item.meanings.forEach(m => {
                // We pick the definition that is shortest/clearest
                const rawDef = m.definitions[0].definition;
                
                content += `
                    <div class="meaning-card">
                        <span class="pos">${m.partOfSpeech}</span>
                        <div class="simple-text">${rawDef}</div>
                        ${m.definitions[0].example ? `<div class="example-box">" ${m.definitions[0].example} "</div>` : ''}
                    </div>
                `;
            });

            resArea.innerHTML = content;
        }
    </script>
</body>
</html>
