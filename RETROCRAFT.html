<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MC_World_Selector - Chromebook Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; cursor: crosshair; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; display: block; }
        
        #menu { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; color: white; 
        }
        .controls-list { background: #333; padding: 15px; border: 1px solid #fff; margin-bottom: 20px; font-size: 14px; line-height: 1.6; }
        .menu-btn { 
            width: 250px; padding: 15px; margin: 10px; background: #555; 
            border: 3px solid #fff; color: white; font-size: 18px; text-align: center; cursor: pointer;
        }
        .menu-btn:hover { background: #777; }

        #ui-layer { position: fixed; top: 10px; left: 10px; color: white; text-shadow: 2px 2px #000; z-index: 100; pointer-events: none; font-size: 12px; }
        #inventory { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; background: rgba(0,0,0,0.7); padding: 5px; border: 2px solid #888; z-index: 101;
        }
        .slot { width: 50px; height: 50px; margin: 0 5px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; text-align: center; }
        .active { border-color: #fff; background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div id="menu">
        <h1>MINECRAFT BETA (Chromebook)</h1>
        <div class="controls-list">
            <b>CONTROLS:</b><br>
            WASD - Move<br>
            MOUSE - Look Around<br>
            LEFT CLICK - Mine Block<br>
            P KEY - Place Block<br>
            SPACE - Jump<br>
            1-6 KEYS - Select Inventory
        </div>
        <div class="menu-btn" onclick="startGame('flat')">START FLAT WORLD</div>
        <div class="menu-btn" onclick="startGame('forest')">START FOREST WORLD</div>
    </div>

    <div id="ui-layer">FPS: <span id="fps">0</span><br>MC BETA 2026 - CHROMEBOOK</div>
    <div id="inventory">
        <div id="slot-0" class="slot active">1:WOOD</div>
        <div id="slot-1" class="slot">2:STONE</div>
        <div id="slot-2" class="slot">3:GLASS</div>
        <div id="slot-3" class="slot">4:BUSH</div>
        <div id="slot-4" class="slot">5:DIRT</div>
        <div id="slot-5" class="slot">6:GRASS</div>
    </div>

    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, raycaster;
        let objects = [], moveData = { x: 0, y: 0 };
        let velocityY = 0, selectedSlot = 0, lastTime = 0, frameCount = 0;
        const gravity = 0.012, playerHeight = 1.7;
        let keys = {};

        function createPixelTex(c1, c2) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            for(let x=0; x<16; x++) {
                for(let y=0; y<16; y++) {
                    ctx.fillStyle = Math.random() > 0.4 ? c1 : c2;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = tex.minFilter = THREE.NearestFilter;
            return tex;
        }

        const texs = {
            grass: createPixelTex('#59c037', '#48a02c'),
            dirt: createPixelTex('#866043', '#664229'),
            stone: createPixelTex('#808080', '#666666'),
            wood: createPixelTex('#b38b5f', '#967249'),
            leaf: createPixelTex('#348028', '#26601d'),
            glass: createPixelTex('#aaddff', '#ffffff'),
            bush: createPixelTex('#1a4d14', '#0f2e0b')
        };

        const invBlocks = [texs.wood, texs.stone, texs.glass, texs.bush, texs.dirt, texs.grass];

        function startGame(type) {
            document.getElementById('menu').style.display = 'none';
            init(type);
            setupDesktopControls();
            animate();
        }

        function init(type) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 1, 30);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 0);
            camera.rotation.order = 'YXZ'; 

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));

            const radius = 12;
            for (let x = -radius; x < radius; x++) {
                for (let z = -radius; z < radius; z++) {
                    addBlock(x, 0, z, texs.grass);
                    for (let y = -1; y > -25; y--) {
                        if (y < -2 && Math.random() < 0.08) continue;
                        addBlock(x, y, z, y > -4 ? texs.dirt : texs.stone);
                    }
                    if (type === 'forest' && Math.random() > 0.95 && (Math.abs(x) > 2 || Math.abs(z) > 2)) {
                        spawnTree(x, 1, z);
                    }
                }
            }
        }

        function addBlock(x, y, z, tex) {
            const mat = new THREE.MeshLambertMaterial({ map: tex, transparent: tex === texs.glass, opacity: tex === texs.glass ? 0.5 : 1 });
            const block = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
            block.position.set(x, y, z);
            scene.add(block);
            objects.push(block);
        }

        function spawnTree(x, y, z) {
            const h = 3 + Math.floor(Math.random() * 2);
            for(let i=0; i<h; i++) addBlock(x, y+i, z, texs.wood);
            for(let ix=-1; ix<=1; ix++) for(let iy=h; iy<=h+1; iy++) for(let iz=-1; iz<=1; iz++) addBlock(x+ix, y+iy, z+iz, texs.leaf);
        }

        function interact(isMining) {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(objects);
            if (hits.length > 0 && hits[0].distance < 6) {
                if (isMining) {
                    scene.remove(hits[0].object);
                    objects = objects.filter(o => o !== hits[0].object);
                } else {
                    const pos = hits[0].object.position.clone().add(hits[0].face.normal);
                    addBlock(pos.x, pos.y, pos.z, invBlocks[selectedSlot]);
                }
            }
        }

        function setupDesktopControls() {
            // Keyboard Listeners
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                // Inventory Hotkeys 1-6
                if(e.key >= 1 && e.key <= 6) {
                    document.querySelector('.active').classList.remove('active');
                    selectedSlot = parseInt(e.key) - 1;
                    document.getElementById('slot-' + selectedSlot).classList.add('active');
                }
                // P key for Place
                if(e.code === 'KeyP') interact(false);
                // Space for Jump
                if(e.code === 'Space' && velocityY === 0) velocityY = 0.25;
            });
            window.addEventListener('keyup', e => keys[e.code] = false);

            // Mouse Look Listener
            window.addEventListener('mousemove', e => {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x -= e.movementY * 0.003;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            });

            // Click to Mine
            window.addEventListener('mousedown', e => {
                if(e.button === 0) interact(true);
            });

            // Request Pointer Lock (Standard for Chromebook games)
            renderer.domElement.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });
        }

        function animate(time) {
            requestAnimationFrame(animate);
            
            // FPS Counter
            frameCount++;
            if (time > lastTime + 1000) { 
                document.getElementById('fps').innerText = frameCount; 
                frameCount = 0; lastTime = time; 
            }

            // WASD Movement Logic
            moveData.x = 0; moveData.y = 0;
            if(keys['KeyW']) moveData.y = 1;
            if(keys['KeyS']) moveData.y = -1;
            if(keys['KeyA']) moveData.x = -1;
            if(keys['KeyD']) moveData.x = 1;

            // Physics / Gravity
            velocityY -= gravity;
            camera.position.y += velocityY;
            if (camera.position.y < -30) { camera.position.set(0, 5, 0); velocityY = 0; }
            
            const downRay = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0));
            const intersect = downRay.intersectObjects(objects);
            if (intersect.length > 0 && intersect[0].distance < playerHeight) {
                camera.position.y = intersect[0].object.position.y + 0.5 + playerHeight;
                velocityY = 0;
            }

            // Movement Execution
            const speed = 0.13;
            camera.position.x += (Math.cos(camera.rotation.y) * moveData.x - Math.sin(camera.rotation.y) * moveData.y) * speed;
            camera.position.z += (-Math.sin(camera.rotation.y) * moveData.x - Math.cos(camera.rotation.y) * moveData.y) * speed;
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
